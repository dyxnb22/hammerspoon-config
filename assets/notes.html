<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --shell-bg: rgba(244, 246, 250, 0.92);
      --shell-border: rgba(255, 255, 255, 0.54);
      --panel-bg: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --surface: rgba(255, 255, 255, 0.56);
      --surface-strong: rgba(255, 255, 255, 0.86);
      --text: #0f1728;
      --muted: #67748d;
      --hairline: rgba(15, 23, 42, 0.08);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.13);
      --shadow: 0 26px 72px rgba(15, 23, 42, 0.16);
      --chip: rgba(255, 255, 255, 0.22);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: rgba(16, 19, 28, 0.94);
        --shell-border: rgba(255, 255, 255, 0.08);
        --panel-bg: rgba(24, 29, 41, 0.82);
        --panel-strong: rgba(31, 38, 53, 0.94);
        --surface: rgba(255, 255, 255, 0.06);
        --surface-strong: rgba(255, 255, 255, 0.10);
        --text: #f7f9fc;
        --muted: #96a1b9;
        --hairline: rgba(255, 255, 255, 0.08);
        --accent-soft: rgba(94, 168, 255, 0.18);
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
        --chip: rgba(255, 255, 255, 0.08);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(99, 187, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(91, 111, 255, 0.18), transparent 34%),
        transparent;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      border-radius: 30px;
      overflow: hidden;
      background: var(--shell-bg);
      border: 1px solid var(--shell-border);
      backdrop-filter: blur(44px) saturate(180%);
      -webkit-backdrop-filter: blur(44px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.16) inset,
        0 32px 90px rgba(15, 23, 42, 0.24);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 22px 22px 12px;
    }

    .eyebrow {
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.45;
    }

    .heroActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .heroActions button,
    .segmented button,
    .toolbar button {
      border: 1px solid var(--hairline);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: var(--text);
      cursor: pointer;
      transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    .heroActions button {
      height: 40px;
      padding: 0 16px;
    }

    .heroActions button.primary {
      background: linear-gradient(135deg, #4f8cff 0%, #2563eb 100%);
      color: white;
      border-color: transparent;
    }

    .heroActions button:hover,
    .segmented button:hover,
    .toolbar button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.10);
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 0 22px 12px;
    }

    .segmented {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid var(--hairline);
    }

    .segmented button {
      height: 36px;
      padding: 0 14px;
      font-size: 12px;
    }

    .segmented button.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(37, 99, 235, 0.18);
    }

    .searchBar {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 10px;
    }

    .search,
    .select {
      width: 100%;
      height: 46px;
      border-radius: 16px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.54);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .statusRow {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 0 22px 14px;
      flex-wrap: wrap;
    }

    .statusChips,
    .metaChips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      color: var(--muted);
      background: var(--chip);
      border: 1px solid var(--hairline);
    }

    .chip strong {
      color: var(--text);
      font-weight: 700;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 250px minmax(0, 1.1fr) minmax(300px, 0.9fr);
      gap: 16px;
      padding: 0 22px 18px;
    }

    .panel {
      min-height: 0;
      border-radius: 24px;
      border: 1px solid var(--hairline);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
    }

    .sidebar {
      grid-template-rows: auto 1fr;
    }

    .workspacePanel,
    .inspector {
      grid-template-rows: auto 1fr auto;
    }

    .panelHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.10);
    }

    .panelTitle {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .panelMeta {
      font-size: 12px;
      color: var(--muted);
    }

    .panelBody {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .filterSection + .filterSection {
      margin-top: 14px;
    }

    .sectionLabel {
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .filterList,
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filterItem,
    .item {
      border: 1px solid transparent;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.10);
      padding: 12px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .filterItem:hover,
    .filterItem.active,
    .item:hover,
    .item.active {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(37, 99, 235, 0.16);
      transform: translateY(-1px);
    }

    .itemTitle {
      margin-bottom: 5px;
      font-size: 14px;
      font-weight: 650;
      word-break: break-word;
    }

    .itemMeta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .tagRow {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      font-size: 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 8px;
    }

    .workspaceCanvas {
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    #graphCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 55%),
        rgba(255, 255, 255, 0.04);
    }

    #graphCanvas.dragging {
      cursor: grabbing;
    }

    .graphOverlay {
      position: absolute;
      inset: 14px 14px auto auto;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .graphOverlay button {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.66);
      color: var(--text);
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      display: none;
      max-width: 280px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(20, 24, 34, 0.92);
      color: #f8fafc;
      font-size: 12px;
      line-height: 1.4;
      z-index: 5;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .hidden {
      display: none !important;
    }

    .empty {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    .inspectorHero {
      padding: 18px 16px 12px;
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.08);
    }

    .inspectorTitle {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .inspectorSubtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .inspectorTags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .inspectorTag {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.16);
      color: var(--muted);
    }

    .inspectorBody {
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: grid;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .cardSection {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.10);
      padding: 14px;
    }

    .cardSectionTitle {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .inspectorFooter {
      display: flex;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.08);
    }

    .inspectorFooter button {
      flex: 1;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      cursor: pointer;
    }

    .inspectorFooter .primary {
      background: linear-gradient(135deg, #4f8cff 0%, #2563eb 100%);
      color: white;
      border-color: transparent;
    }

    .inspectorFooter .secondary {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 18px 14px;
      border-top: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 11px;
      background: rgba(255, 255, 255, 0.10);
    }

    .keys {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .key {
      min-width: 30px;
      border-radius: 10px;
      border: 1px solid var(--hairline);
      padding: 6px 8px;
      text-align: center;
      color: var(--text);
      background: rgba(255, 255, 255, 0.18);
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .inspector {
        grid-column: 1 / -1;
        min-height: 320px;
      }
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .searchBar {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <div class="eyebrow">Notes</div>
        <h1 class="title">Notes Center</h1>
        <div class="subtitle" id="vaultLabel">一个页面里完成浏览、搜索、图谱和预览。Esc 会先退出当前笔记，再返回主页。</div>
      </div>
      <div class="heroActions">
        <button id="backHomeBtn" type="button">返回主页</button>
        <button id="refreshBtn" type="button">刷新索引</button>
        <button id="newDailyBtn" class="primary" type="button">今日笔记</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="segmented">
        <button class="tab active" data-view="graph" type="button">Graph</button>
        <button class="tab" data-view="browse" type="button">Browse</button>
        <button class="tab" data-view="search" type="button">Search</button>
        <button class="tab" data-view="recent" type="button">Recent</button>
      </div>
      <div class="searchBar">
        <input id="searchInput" class="search" type="search" placeholder="搜索标题、路径、标签、内容..." />
        <select id="graphMode" class="select">
          <option value="links">链接图</option>
          <option value="parent">层级图</option>
          <option value="tags">标签团簇</option>
        </select>
      </div>
      <div class="metaChips">
        <span id="statsLabel" class="chip"><strong>0</strong> notes</span>
        <span id="viewLabel" class="chip"><strong>Graph</strong> 当前视图</span>
      </div>
    </div>

    <div class="statusRow">
      <div id="statusChips" class="statusChips"></div>
      <button id="clearFiltersBtn" type="button" class="chip">清空筛选</button>
    </div>

    <div class="workspace">
      <aside class="panel sidebar">
        <div class="panelHeader">
          <div class="panelTitle">Filters</div>
          <div class="panelMeta">快速收束结果</div>
        </div>
        <div class="panelBody">
          <div class="filterSection">
            <div class="sectionLabel">Folders</div>
            <div id="folderFilters" class="filterList"></div>
          </div>
          <div class="filterSection">
            <div class="sectionLabel">Tags</div>
            <div id="tagFilters" class="filterList"></div>
          </div>
        </div>
      </aside>

      <section class="panel workspacePanel">
        <div class="panelHeader">
          <div>
            <div class="panelTitle">Workspace</div>
            <div id="panelMeta" class="panelMeta">图谱、列表和最近访问统一在这里</div>
          </div>
          <div id="panelHint" class="panelMeta">点击选中，回车或主按钮打开</div>
        </div>
        <div id="workspaceCanvas" class="workspaceCanvas">
          <div id="graphView" class="panelBody">
            <div style="position:relative; height:100%;">
              <canvas id="graphCanvas"></canvas>
              <div class="graphOverlay">
                <button id="zoomOutBtn" type="button">−</button>
                <button id="fitGraphBtn" type="button">⌂</button>
                <button id="zoomInBtn" type="button">+</button>
              </div>
              <div id="graphTooltip" class="tooltip"></div>
            </div>
          </div>
          <div id="listView" class="panelBody hidden">
            <div id="resultsList" class="list"></div>
          </div>
        </div>
        <div class="inspectorFooter">
          <button id="openSelectedBtn" class="primary" type="button">打开选中笔记</button>
          <button id="closeDetailBtn" class="secondary" type="button">退出当前笔记</button>
        </div>
      </section>

      <aside class="panel inspector">
        <div class="panelHeader">
          <div class="panelTitle">Preview</div>
          <div id="previewMeta" class="panelMeta">未选中笔记</div>
        </div>
        <div id="inspectorHero" class="inspectorHero"></div>
        <div id="inspectorBody" class="inspectorBody"></div>
        <div class="inspectorFooter">
          <button id="previewOpenBtn" class="primary" type="button">在 Typora 中打开</button>
          <button id="previewBackBtn" class="secondary" type="button">返回主页</button>
        </div>
      </aside>
    </div>

    <div class="footer">
      <div class="keys">
        <div class="key">↑</div>
        <div class="key">↓</div>
        <div class="key">Enter</div>
        <div class="key">Esc</div>
      </div>
      <div id="footerHint">Esc 先退出当前选中笔记，再返回 Launcher 主页</div>
    </div>
  </div>

  <script>
    const state = {
      rootFolderKey: '__ROOT__',
      index: { nodes: [], edges: [], tags: {}, recent: [], vault: '' },
      view: 'graph',
      graphMode: 'links',
      folderFilter: '',
      tagFilter: '',
      searchQuery: '',
      selectedId: null,
      graphNodes: [],
      graphEdges: [],
      simNodes: [],
      hoveredId: null,
      draggingNodeId: null,
      draggingCanvas: false,
      pointerMode: null,
      lastPointer: { x: 0, y: 0 },
      panX: 0,
      panY: 0,
      scale: 1,
      settledFrames: 0,
    };

    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');
    const tooltip = document.getElementById('graphTooltip');
    const resultsList = document.getElementById('resultsList');
    const statsLabel = document.getElementById('statsLabel');
    const viewLabel = document.getElementById('viewLabel');
    const statusChips = document.getElementById('statusChips');
    const panelMeta = document.getElementById('panelMeta');
    const panelHint = document.getElementById('panelHint');
    const previewMeta = document.getElementById('previewMeta');
    const inspectorHero = document.getElementById('inspectorHero');
    const inspectorBody = document.getElementById('inspectorBody');

    function postMessage(payload) {
      try {
        webkit.messageHandlers.notes.postMessage(payload);
      } catch (error) {
        console.log(error);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(ts) {
      if (!ts) return '';
      return new Date(ts * 1000).toLocaleString();
    }

    function nodeById(id) {
      return state.index.nodes.find(node => node.id === id) || null;
    }

    function visibleNodes() {
      return state.index.nodes.filter(node => {
        if (state.folderFilter) {
          const nodeFolder = node.folder || state.rootFolderKey;
          if (nodeFolder !== state.folderFilter) return false;
        }
        if (state.tagFilter && !(node.tags || []).includes(state.tagFilter)) return false;
        return true;
      });
    }

    function currentListItems() {
      const nodes = visibleNodes();
      if (state.view === 'recent') {
        const allowed = new Set(nodes.map(node => node.id));
        return (state.index.recent || [])
          .filter(item => allowed.has(item.id))
          .map(item => nodeById(item.id) || item);
      }

      if (state.view === 'browse') {
        return [...nodes].sort((a, b) => a.relPath.localeCompare(b.relPath));
      }

      const query = state.searchQuery.trim().toLowerCase();
      return nodes
        .map(node => ({ node, score: scoreNode(node, query) }))
        .filter(entry => entry.score >= 0)
        .sort((a, b) => b.score - a.score)
        .map(entry => entry.node);
    }

    function scoreNode(node, query) {
      if (!query) return 1;
      const haystack = [
        node.title,
        node.relPath,
        node.path,
        (node.tags || []).join(' '),
        node.excerpt,
      ].join(' ').toLowerCase();

      if ((node.title || '').toLowerCase().startsWith(query)) return 300;
      if ((node.title || '').toLowerCase().includes(query)) return 200;
      if (haystack.includes(query)) return 100;
      return -1;
    }

    function selectNote(id, options = {}) {
      const node = nodeById(id);
      if (!node) return;
      state.selectedId = id;
      renderPreview();
      if (options.focusGraph && state.view === 'graph') {
        focusNode(id);
      }
      renderList();
    }

    function clearSelection() {
      state.selectedId = null;
      renderPreview();
      renderList();
      drawGraph();
    }

    function openSelectedNote() {
      const node = nodeById(state.selectedId);
      if (!node) return;
      postMessage({ type: 'open', path: node.path });
    }

    function backOrClose() {
      if (state.selectedId) {
        clearSelection();
        return;
      }
      postMessage({ type: 'home' });
    }

    function renderStatusChips() {
      const chips = [];
      chips.push(`<span class="chip"><strong>${state.index.nodes.length}</strong> 笔记</span>`);
      chips.push(`<span class="chip"><strong>${(state.index.edges || []).length}</strong> 连接</span>`);
      if (state.folderFilter) {
        chips.push(`<span class="chip"><strong>Folder</strong> ${escapeHtml(state.folderFilter === state.rootFolderKey ? '(root)' : state.folderFilter)}</span>`);
      }
      if (state.tagFilter) {
        chips.push(`<span class="chip"><strong>Tag</strong> ${escapeHtml(state.tagFilter)}</span>`);
      }
      if (state.searchQuery.trim()) {
        chips.push(`<span class="chip"><strong>Search</strong> ${escapeHtml(state.searchQuery.trim())}</span>`);
      }
      statusChips.innerHTML = chips.join('');
    }

    function renderFilters() {
      const folders = new Set();
      const tags = Object.keys(state.index.tags || {}).sort((a, b) => a.localeCompare(b));

      for (const node of state.index.nodes) {
        folders.add(node.folder || '(root)');
      }

      const folderFilters = document.getElementById('folderFilters');
      folderFilters.innerHTML = [''].concat([...folders].sort()).map(folder => {
        const isRoot = folder === '(root)';
        const value = isRoot ? state.rootFolderKey : folder;
        const label = folder === '' ? 'All folders' : folder;
        const active = state.folderFilter === value ? ' active' : '';
        return `<button type="button" class="filterItem${active}" data-folder="${escapeHtml(value)}"><div class="itemTitle">${escapeHtml(label)}</div></button>`;
      }).join('');

      for (const item of folderFilters.querySelectorAll('.filterItem')) {
        item.addEventListener('click', () => {
          state.folderFilter = item.dataset.folder || '';
          renderAll();
        });
      }

      const tagFilters = document.getElementById('tagFilters');
      tagFilters.innerHTML = [''].concat(tags).map(tag => {
        const label = tag === '' ? 'All tags' : tag;
        const active = state.tagFilter === tag ? ' active' : '';
        return `<button type="button" class="filterItem${active}" data-tag="${escapeHtml(tag)}"><div class="itemTitle">${escapeHtml(label)}</div></button>`;
      }).join('');

      for (const item of tagFilters.querySelectorAll('.filterItem')) {
        item.addEventListener('click', () => {
          state.tagFilter = item.dataset.tag || '';
          renderAll();
        });
      }
    }

    function renderItem(node, extra) {
      const tags = (node.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
      const active = node.id === state.selectedId ? ' active' : '';
      return `
        <button type="button" class="item${active}" data-id="${escapeHtml(node.id)}">
          <div class="itemTitle">${escapeHtml(node.title)}</div>
          <div class="itemMeta">${escapeHtml(node.relPath || node.path)}</div>
          <div class="itemMeta">${escapeHtml(formatTime(node.mtime))}${extra ? ` · ${escapeHtml(extra)}` : ''}</div>
          ${tags ? `<div class="tagRow">${tags}</div>` : ''}
        </button>
      `;
    }

    function renderList() {
      const items = currentListItems();
      if (state.view === 'graph') {
        return;
      }

      resultsList.innerHTML = items.length
        ? items.map(node => renderItem(node, state.view === 'search' ? node.excerpt : '')).join('')
        : '<div class="empty">当前筛选下没有结果。</div>';

      for (const node of resultsList.querySelectorAll('.item')) {
        node.addEventListener('click', () => selectNote(node.dataset.id));
        node.addEventListener('dblclick', () => {
          selectNote(node.dataset.id);
          openSelectedNote();
        });
      }
    }

    function renderPreview() {
      const node = nodeById(state.selectedId);
      if (!node) {
        previewMeta.textContent = '未选中笔记';
        inspectorHero.innerHTML = `
          <h2 class="inspectorTitle">选择一张卡片或一个节点</h2>
          <div class="inspectorSubtitle">左侧筛选，中间浏览或看图谱，右侧始终保持预览和动作区。这样不用跳到单独页面。</div>
          <div class="inspectorTags">
            <span class="inspectorTag">Esc 返回 Launcher</span>
            <span class="inspectorTag">Enter 打开选中笔记</span>
            <span class="inspectorTag">单击先预览</span>
          </div>
        `;
        inspectorBody.innerHTML = `
          <div class="cardSection">
            <div class="cardSectionTitle">当前状态</div>
            ${state.searchQuery ? `正在搜索 “${escapeHtml(state.searchQuery)}”。` : '当前没有选中的笔记。'}
          </div>
          <div class="cardSection">
            <div class="cardSectionTitle">建议</div>
            从图谱里点击节点，或者在 Browse / Search / Recent 里点一条笔记，就会在这里直接展开详情。
          </div>
        `;
        return;
      }

      previewMeta.textContent = node.relPath || node.path;
      inspectorHero.innerHTML = `
        <h2 class="inspectorTitle">${escapeHtml(node.title)}</h2>
        <div class="inspectorSubtitle">${escapeHtml(node.relPath || node.path)}</div>
        <div class="inspectorTags">
          <span class="inspectorTag">${escapeHtml(formatTime(node.mtime))}</span>
          <span class="inspectorTag">${escapeHtml(node.folder || '(root)')}</span>
          ${(node.tags || []).map(tag => `<span class="inspectorTag">${escapeHtml(tag)}</span>`).join('')}
        </div>
      `;
      inspectorBody.innerHTML = `
        <div class="cardSection">
          <div class="cardSectionTitle">内容预览</div>
          ${escapeHtml(node.excerpt || '暂无摘要')}
        </div>
        <div class="cardSection">
          <div class="cardSectionTitle">打开方式</div>
          现在可以直接在这里预览，确定后再打开 Typora。Esc 会先退出当前笔记预览。
        </div>
        <div class="cardSection">
          <div class="cardSectionTitle">图谱联动</div>
          选中这个笔记时，图谱里会高亮当前节点和相关路径，帮助你保持上下文。
        </div>
      `;
    }

    function setView(view) {
      state.view = view;
      for (const tab of document.querySelectorAll('.tab')) {
        tab.classList.toggle('active', tab.dataset.view === view);
      }
      viewLabel.innerHTML = `<strong>${escapeHtml(view[0].toUpperCase() + view.slice(1))}</strong> 当前视图`;

      const useGraph = view === 'graph';
      document.getElementById('graphView').classList.toggle('hidden', !useGraph);
      document.getElementById('listView').classList.toggle('hidden', useGraph);
      panelHint.textContent = useGraph ? '点击节点先预览，双击打开' : '点击列表先预览，双击打开';
      panelMeta.textContent = useGraph
        ? `图模式：${document.getElementById('graphMode').selectedOptions[0].textContent}`
        : `${currentListItems().length} 条结果`;

      if (useGraph) {
        buildGraphData();
        resizeCanvas();
      } else {
        renderList();
      }
    }

    function buildGraphData() {
      const nodes = visibleNodes();
      const allowed = new Set(nodes.map(node => node.id));
      let edges = (state.index.edges || []).filter(edge => allowed.has(edge.from) && allowed.has(edge.to));

      if (state.graphMode === 'parent') {
        edges = edges.filter(edge => edge.type === 'parent');
      } else if (state.graphMode === 'tags') {
        edges = [];
        for (const [tag, ids] of Object.entries(state.index.tags || {})) {
          const visible = ids.filter(id => allowed.has(id));
          for (let i = 0; i < visible.length; i++) {
            for (let j = i + 1; j < visible.length; j++) {
              edges.push({ from: visible[i], to: visible[j], type: 'tag', tag });
            }
          }
        }
      } else {
        edges = edges.filter(edge => edge.type !== 'parent');
      }

      state.graphNodes = nodes;
      state.graphEdges = edges;
      initSimulation();
    }

    function initSimulation() {
      const rect = graphCanvas.getBoundingClientRect();
      const width = rect.width || 800;
      const height = rect.height || 560;
      const centerX = width / 2;
      const centerY = height / 2;
      state.settledFrames = 0;

      state.simNodes = state.graphNodes.map((node, index) => {
        const angle = (index / Math.max(state.graphNodes.length, 1)) * Math.PI * 2;
        const radius = Math.min(width, height) * 0.24;
        return {
          id: node.id,
          node,
          x: centerX + Math.cos(angle) * radius,
          y: centerY + Math.sin(angle) * radius,
          vx: 0,
          vy: 0,
        };
      });
    }

    function fitGraph() {
      state.panX = 0;
      state.panY = 0;
      state.scale = 1;
      drawGraph();
    }

    function toWorld(screenX, screenY) {
      return {
        x: (screenX - state.panX) / state.scale,
        y: (screenY - state.panY) / state.scale,
      };
    }

    function resizeCanvas() {
      const rect = graphCanvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      graphCanvas.width = rect.width * ratio;
      graphCanvas.height = rect.height * ratio;
      graphCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      drawGraph();
    }

    function drawGraph() {
      const rect = graphCanvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      graphCtx.clearRect(0, 0, width, height);

      if (!state.simNodes.length) {
        graphCtx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted');
        graphCtx.font = '14px -apple-system, sans-serif';
        graphCtx.fillText('没有可显示的笔记。添加内容后刷新索引即可。', 24, 40);
        return;
      }

      graphCtx.save();
      graphCtx.translate(state.panX, state.panY);
      graphCtx.scale(state.scale, state.scale);

      const lookup = new Map(state.simNodes.map(item => [item.id, item]));

      for (const edge of state.graphEdges) {
        const from = lookup.get(edge.from);
        const to = lookup.get(edge.to);
        if (!from || !to) continue;
        const active = state.selectedId && (edge.from === state.selectedId || edge.to === state.selectedId);
        graphCtx.strokeStyle = edge.type === 'parent'
          ? (active ? 'rgba(37, 99, 235, 0.80)' : 'rgba(37, 99, 235, 0.46)')
          : (active ? 'rgba(94, 168, 255, 0.72)' : 'rgba(124, 136, 156, 0.28)');
        graphCtx.lineWidth = active ? 2.6 : (edge.type === 'parent' ? 2 : 1.1);
        graphCtx.beginPath();
        graphCtx.moveTo(from.x, from.y);
        graphCtx.lineTo(to.x, to.y);
        graphCtx.stroke();
      }

      for (const item of state.simNodes) {
        const active = item.id === state.hoveredId || item.id === state.selectedId;
        const radius = active ? 11 : 8;
        graphCtx.beginPath();
        graphCtx.fillStyle = active ? '#2563eb' : '#5ea8ff';
        graphCtx.arc(item.x, item.y, radius, 0, Math.PI * 2);
        graphCtx.fill();

        if (active) {
          graphCtx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text');
          graphCtx.font = '12px -apple-system, sans-serif';
          graphCtx.fillText(item.node.title, item.x + 12, item.y - 10);
        }
      }

      graphCtx.restore();
    }

    function stepSimulation() {
      if (state.view === 'graph' && state.simNodes.length) {
        const rect = graphCanvas.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const lookup = new Map(state.simNodes.map(item => [item.id, item]));

        let energy = 0;

        for (let i = 0; i < state.simNodes.length; i++) {
          for (let j = i + 1; j < state.simNodes.length; j++) {
            const a = state.simNodes[i];
            const b = state.simNodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.max(Math.hypot(dx, dy), 1);
            const force = 850 / (dist * dist);
            a.vx -= (dx / dist) * force;
            a.vy -= (dy / dist) * force;
            b.vx += (dx / dist) * force;
            b.vy += (dy / dist) * force;
          }
        }

        for (const edge of state.graphEdges) {
          const from = lookup.get(edge.from);
          const to = lookup.get(edge.to);
          if (!from || !to) continue;
          const dx = to.x - from.x;
          const dy = to.y - from.y;
          const dist = Math.max(Math.hypot(dx, dy), 1);
          const desired = state.graphMode === 'tags' ? 150 : 112;
          const force = (dist - desired) * 0.025;
          from.vx += (dx / dist) * force;
          from.vy += (dy / dist) * force;
          to.vx -= (dx / dist) * force;
          to.vy -= (dy / dist) * force;
        }

        for (const item of state.simNodes) {
          if (state.draggingNodeId === item.id) continue;
          item.vx += (centerX - item.x) * 0.0012;
          item.vy += (centerY - item.y) * 0.0012;
          item.vx *= 0.86;
          item.vy *= 0.86;
          item.x += item.vx;
          item.y += item.vy;
          item.x = Math.max(24, Math.min(width - 24, item.x));
          item.y = Math.max(24, Math.min(height - 24, item.y));
          energy += Math.abs(item.vx) + Math.abs(item.vy);
        }

        if (energy < 0.06) {
          state.settledFrames += 1;
        } else {
          state.settledFrames = 0;
        }

        drawGraph();
      }

      requestAnimationFrame(stepSimulation);
    }

    function graphNodeAt(screenX, screenY) {
      const point = toWorld(screenX, screenY);
      for (let i = state.simNodes.length - 1; i >= 0; i--) {
        const item = state.simNodes[i];
        if (Math.hypot(item.x - point.x, item.y - point.y) <= 14) {
          return item;
        }
      }
      return null;
    }

    function showTooltip(item, x, y) {
      if (!item) {
        tooltip.style.display = 'none';
        return;
      }
      tooltip.style.display = 'block';
      tooltip.style.left = `${x + 14}px`;
      tooltip.style.top = `${y + 14}px`;
      tooltip.innerHTML = `
        <strong>${escapeHtml(item.node.title)}</strong><br/>
        ${escapeHtml(item.node.relPath || item.node.path)}<br/>
        ${escapeHtml((item.node.tags || []).join(', '))}<br/>
        ${escapeHtml(item.node.excerpt || '')}
      `;
    }

    function focusNode(id) {
      const item = state.simNodes.find(node => node.id === id);
      if (!item) return;
      const rect = graphCanvas.getBoundingClientRect();
      state.panX = rect.width / 2 - item.x * state.scale;
      state.panY = rect.height / 2 - item.y * state.scale;
      drawGraph();
    }

    function renderAll() {
      document.getElementById('vaultLabel').textContent = state.index.vault || 'Typora vault manager';
      statsLabel.innerHTML = `<strong>${state.index.nodes.length}</strong> notes`;
      renderStatusChips();
      renderFilters();
      renderPreview();
      setView(state.view);
    }

    graphCanvas.addEventListener('pointerdown', event => {
      const rect = graphCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const item = graphNodeAt(x, y);
      state.lastPointer = { x: event.clientX, y: event.clientY };
      if (item) {
        state.pointerMode = 'node';
        state.draggingNodeId = item.id;
        selectNote(item.id);
      } else {
        state.pointerMode = 'canvas';
        state.draggingCanvas = true;
        graphCanvas.classList.add('dragging');
      }
      graphCanvas.setPointerCapture?.(event.pointerId);
    });

    graphCanvas.addEventListener('pointermove', event => {
      const rect = graphCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const item = graphNodeAt(x, y);

      if (state.pointerMode === 'node' && state.draggingNodeId) {
        const world = toWorld(x, y);
        const dragged = state.simNodes.find(node => node.id === state.draggingNodeId);
        if (dragged) {
          dragged.x = world.x;
          dragged.y = world.y;
          dragged.vx = 0;
          dragged.vy = 0;
          drawGraph();
        }
      } else if (state.pointerMode === 'canvas' && state.draggingCanvas) {
        state.panX += event.clientX - state.lastPointer.x;
        state.panY += event.clientY - state.lastPointer.y;
        state.lastPointer = { x: event.clientX, y: event.clientY };
        drawGraph();
      } else {
        state.hoveredId = item ? item.id : null;
        showTooltip(item, x, y);
        drawGraph();
      }
    });

    graphCanvas.addEventListener('pointerup', event => {
      const rect = graphCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const item = graphNodeAt(x, y);
      if (!state.pointerMode && item) {
        selectNote(item.id);
      }
      state.pointerMode = null;
      state.draggingCanvas = false;
      state.draggingNodeId = null;
      graphCanvas.classList.remove('dragging');
    });

    graphCanvas.addEventListener('dblclick', event => {
      const rect = graphCanvas.getBoundingClientRect();
      const item = graphNodeAt(event.clientX - rect.left, event.clientY - rect.top);
      if (item) {
        selectNote(item.id);
        openSelectedNote();
      }
    });

    graphCanvas.addEventListener('mouseleave', () => {
      state.hoveredId = null;
      tooltip.style.display = 'none';
      drawGraph();
    });

    graphCanvas.addEventListener('wheel', event => {
      event.preventDefault();
      const rect = graphCanvas.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;
      const worldBefore = toWorld(mouseX, mouseY);
      const nextScale = Math.max(0.65, Math.min(2.1, state.scale * (event.deltaY > 0 ? 0.92 : 1.08)));
      state.scale = nextScale;
      state.panX = mouseX - worldBefore.x * state.scale;
      state.panY = mouseY - worldBefore.y * state.scale;
      drawGraph();
    }, { passive: false });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      state.scale = Math.min(2.1, state.scale * 1.1);
      drawGraph();
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      state.scale = Math.max(0.65, state.scale * 0.9);
      drawGraph();
    });

    document.getElementById('fitGraphBtn').addEventListener('click', fitGraph);
    document.getElementById('refreshBtn').addEventListener('click', () => postMessage({ type: 'refresh' }));
    document.getElementById('newDailyBtn').addEventListener('click', () => postMessage({ type: 'newDaily' }));
    document.getElementById('backHomeBtn').addEventListener('click', () => postMessage({ type: 'home' }));
    document.getElementById('previewBackBtn').addEventListener('click', backOrClose);
    document.getElementById('closeDetailBtn').addEventListener('click', backOrClose);
    document.getElementById('previewOpenBtn').addEventListener('click', openSelectedNote);
    document.getElementById('openSelectedBtn').addEventListener('click', openSelectedNote);
    document.getElementById('clearFiltersBtn').addEventListener('click', () => {
      state.folderFilter = '';
      state.tagFilter = '';
      state.searchQuery = '';
      document.getElementById('searchInput').value = '';
      renderAll();
    });

    for (const tab of document.querySelectorAll('.tab')) {
      tab.addEventListener('click', () => setView(tab.dataset.view));
    }

    document.getElementById('graphMode').addEventListener('change', event => {
      state.graphMode = event.target.value;
      if (state.view === 'graph') {
        buildGraphData();
        drawGraph();
      }
      panelMeta.textContent = `图模式：${event.target.selectedOptions[0].textContent}`;
    });

    document.getElementById('searchInput').addEventListener('input', event => {
      state.searchQuery = event.target.value;
      if (state.searchQuery && state.view !== 'search') {
        setView('search');
      } else if (state.view !== 'graph') {
        renderList();
      }
      renderStatusChips();
      if (state.view === 'search') {
        renderList();
      }
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        event.preventDefault();
        backOrClose();
        return;
      }

      if (event.key === 'Enter' && state.selectedId) {
        event.preventDefault();
        openSelectedNote();
        return;
      }

      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'f') {
        event.preventDefault();
        document.getElementById('searchInput').focus();
        document.getElementById('searchInput').select();
      }
    });

    window.setNotesIndex = function(index) {
      state.index = index || state.index;
      if (state.selectedId && !nodeById(state.selectedId)) {
        state.selectedId = null;
      }
      renderAll();
    };

    window.focusNotes = function() {
      document.getElementById('searchInput').focus();
      drawGraph();
    };

    window.addEventListener('resize', resizeCanvas);
    requestAnimationFrame(stepSimulation);
    renderAll();
  </script>
</body>
</html>
