<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --shell-bg: rgba(246, 247, 251, 0.92);
      --grid-bg: rgba(15, 23, 42, 0.06);
      --card-bg: rgba(255, 255, 255, 0.88);
      --card-bg-hover: rgba(255, 255, 255, 0.98);
      --text: #101828;
      --muted: #667085;
      --hairline: rgba(15, 23, 42, 0.08);
      --search-bg: rgba(255, 255, 255, 0.72);
      --accent: #2b6ef2;
      --blue: linear-gradient(145deg, #7cc0ff 0%, #2b6ef2 100%);
      --indigo: linear-gradient(145deg, #a7a3ff 0%, #5661ff 100%);
      --teal: linear-gradient(145deg, #63e0d3 0%, #0f9d8f 100%);
      --green: linear-gradient(145deg, #8ae9a2 0%, #24995d 100%);
      --orange: linear-gradient(145deg, #ffd08a 0%, #f08a24 100%);
      --pink: linear-gradient(145deg, #ffb3d2 0%, #f15d8b 100%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: rgba(16, 20, 30, 0.94);
        --grid-bg: rgba(255, 255, 255, 0.05);
        --card-bg: rgba(28, 34, 48, 0.92);
        --card-bg-hover: rgba(36, 44, 62, 0.98);
        --text: #f5f7fb;
        --muted: #98a2b3;
        --hairline: rgba(255, 255, 255, 0.07);
        --search-bg: rgba(24, 30, 44, 0.88);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      color: var(--text);
    }

    .shell {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--shell-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.35) inset,
        0 24px 80px rgba(15, 23, 42, 0.22);
    }

    .topbar {
      padding: 18px 18px 14px;
      display: grid;
      gap: 12px;
    }

    .topRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .editBtn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(43, 110, 242, 0.12);
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease;
    }

    .editBtn:hover { background: rgba(43, 110, 242, 0.18); }
    .editBtn:active { transform: scale(0.97); }

    .search {
      width: 100%;
      height: 52px;
      border: 1px solid var(--hairline);
      border-radius: 16px;
      background: var(--search-bg);
      outline: none;
      font-size: 18px;
      letter-spacing: -0.03em;
      color: var(--text);
      padding: 0 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .search::placeholder {
      color: color-mix(in srgb, var(--muted) 82%, transparent);
    }

    .board {
      min-height: 0;
      overflow: auto;
      background: var(--grid-bg);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      min-height: 100%;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 108px;
      padding: 16px 16px 16px 14px;
      background: var(--card-bg);
      border: 0;
      border-right: 1px solid var(--hairline);
      border-bottom: 1px solid var(--hairline);
      cursor: pointer;
      user-select: none;
      text-align: left;
      transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .card:nth-child(2n) { border-right: 0; }

    .card:hover,
    .card.active {
      background: var(--card-bg-hover);
      z-index: 1;
    }

    .card:active:not(.editing),
    .card.running {
      transform: scale(0.985);
    }

    .card.dragging {
      opacity: 0.42;
      transform: scale(0.96);
    }

    .card.drag-over {
      box-shadow: inset 0 0 0 2px var(--accent);
      z-index: 2;
    }

    .shell.editing .card {
      cursor: grab;
    }

    .shell.editing .card:nth-child(2n + 1) {
      transform: rotate(-0.6deg);
    }

    .shell.editing .card:nth-child(2n) {
      transform: rotate(0.6deg);
    }

    .shell.editing .card:active,
    .shell.editing .card.dragging {
      cursor: grabbing;
      transform: scale(0.985);
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 700;
      box-shadow:
        0 10px 20px rgba(15, 23, 42, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .icon.blue { background: var(--blue); }
    .icon.indigo { background: var(--indigo); }
    .icon.teal { background: var(--teal); }
    .icon.green { background: var(--green); }
    .icon.orange { background: var(--orange); }
    .icon.pink { background: var(--pink); }

    .content { min-width: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cardTitle {
      font-size: 17px;
      line-height: 1.18;
      font-weight: 650;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cardSubtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1 / -1;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: var(--card-bg);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 11px;
      background: rgba(255, 255, 255, 0.18);
    }

    .keys {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .key {
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.18);
      min-width: 30px;
      text-align: center;
      color: var(--text);
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .card { border-right: 0; }
      .title { font-size: 21px; }
      .search { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="shell" class="shell">
    <div class="topbar">
      <div class="topRow">
        <div class="brand">
          <div class="eyebrow">Launcher</div>
          <h1 class="title">Focus now</h1>
        </div>
        <button id="editBtn" class="editBtn" type="button">编辑</button>
      </div>
      <input id="search" class="search" type="search" placeholder="搜索窗口、应用、命令..." autocomplete="off" />
    </div>

    <div class="board">
      <div id="grid" class="grid"></div>
    </div>

    <div class="footer">
      <div class="keys">
        <div class="key">↑</div>
        <div class="key">↓</div>
        <div class="key">←</div>
        <div class="key">→</div>
        <div class="key">Enter</div>
        <div class="key">Esc</div>
      </div>
      <div id="hint">点击卡片打开 · 长按或点编辑可排序</div>
    </div>
  </div>

  <script>
    const state = {
      allItems: [],
      items: [],
      activeIndex: 0,
      editing: false,
      dragId: null,
      dragOverId: null,
      suppressClick: false,
    };

    const icons = {
      window: '◫',
      app: '◎',
      command: '⌘',
    };

    const shell = document.getElementById('shell');
    const search = document.getElementById('search');
    const grid = document.getElementById('grid');
    const editBtn = document.getElementById('editBtn');
    const hint = document.getElementById('hint');

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function postMessage(payload) {
      try {
        webkit.messageHandlers.launcher.postMessage(payload);
      } catch (error) {
        console.log(error);
      }
    }

    function score(item, query) {
      if (!query) return 1000 - item.rank;
      const q = query.toLowerCase();
      const title = item.title.toLowerCase();
      const subtitle = (item.subtitle || '').toLowerCase();
      const badge = (item.badge || '').toLowerCase();

      if (title.startsWith(q)) return 3000 - item.rank;
      if (title.includes(q)) return 2000 - item.rank;
      if (subtitle.includes(q) || badge.includes(q)) return 1000 - item.rank;
      return -1;
    }

    function persistLayout() {
      postMessage({
        type: 'saveLayout',
        order: state.allItems.map(item => item.id),
      });
    }

    function setEditing(enabled) {
      state.editing = enabled;
      shell.classList.toggle('editing', enabled);
      editBtn.textContent = enabled ? '完成' : '编辑';
      hint.textContent = enabled
        ? '拖拽卡片排序，完成后点「完成」'
        : '点击卡片打开 · 长按或点编辑可排序';
      search.disabled = enabled;
      if (!enabled) {
        state.dragId = null;
        state.dragOverId = null;
      }
      render();
    }

    function reorderItems(sourceId, targetId) {
      if (!sourceId || !targetId || sourceId === targetId) return;

      const fromIndex = state.allItems.findIndex(item => item.id === sourceId);
      const toIndex = state.allItems.findIndex(item => item.id === targetId);
      if (fromIndex < 0 || toIndex < 0) return;

      const [moved] = state.allItems.splice(fromIndex, 1);
      state.allItems.splice(toIndex, 0, moved);
      state.allItems.forEach((item, index) => { item.rank = index; });
      persistLayout();
      filterItems();
    }

    function render() {
      if (state.items.length === 0) {
        grid.innerHTML = '<div class="empty">没有匹配结果，换个关键词试试。</div>';
        return;
      }

      grid.innerHTML = state.items.map((item, index) => {
        const classes = ['card'];
        if (index === state.activeIndex && !state.editing) classes.push('active');
        if (state.editing) classes.push('editing');
        if (state.dragId === item.id) classes.push('dragging');
        if (state.dragOverId === item.id) classes.push('drag-over');

        return `
          <button
            class="${classes.join(' ')}"
            type="button"
            data-id="${escapeHtml(item.id)}"
            draggable="${state.editing ? 'true' : 'false'}"
          >
            <div class="icon ${escapeHtml(item.accent)}">${icons[item.kind] || '•'}</div>
            <div class="content">
              <div class="badge">${escapeHtml(item.badge)}</div>
              <div class="cardTitle">${escapeHtml(item.title)}</div>
              <div class="cardSubtitle">${escapeHtml(item.subtitle || '')}</div>
            </div>
          </button>
        `;
      }).join('');

      for (const node of grid.querySelectorAll('.card')) {
        let pressTimer = null;

        node.addEventListener('mousedown', event => {
          if (state.editing) return;
          node.classList.add('running');
        });

        node.addEventListener('mouseup', () => node.classList.remove('running'));
        node.addEventListener('mouseleave', () => node.classList.remove('running'));

        node.addEventListener('click', event => {
          if (state.suppressClick || state.editing) {
            event.preventDefault();
            return;
          }
          runItem(node.dataset.id);
        });

        node.addEventListener('mousedown', event => {
          if (state.editing) return;
          pressTimer = window.setTimeout(() => {
            setEditing(true);
          }, 520);
        });

        node.addEventListener('mouseup', () => {
          if (pressTimer) window.clearTimeout(pressTimer);
        });
        node.addEventListener('mouseleave', () => {
          if (pressTimer) window.clearTimeout(pressTimer);
        });

        node.addEventListener('dragstart', event => {
          if (!state.editing) {
            event.preventDefault();
            return;
          }
          state.dragId = node.dataset.id;
          state.suppressClick = true;
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', node.dataset.id);
          render();
        });

        node.addEventListener('dragend', () => {
          state.dragId = null;
          state.dragOverId = null;
          window.setTimeout(() => { state.suppressClick = false; }, 0);
          render();
        });

        node.addEventListener('dragover', event => {
          if (!state.editing) return;
          event.preventDefault();
          state.dragOverId = node.dataset.id;
          event.dataTransfer.dropEffect = 'move';
          for (const card of grid.querySelectorAll('.card')) {
            card.classList.toggle('drag-over', card.dataset.id === state.dragOverId);
          }
        });

        node.addEventListener('dragleave', () => {
          if (state.dragOverId === node.dataset.id) {
            state.dragOverId = null;
            node.classList.remove('drag-over');
          }
        });

        node.addEventListener('drop', event => {
          if (!state.editing) return;
          event.preventDefault();
          const sourceId = event.dataTransfer.getData('text/plain') || state.dragId;
          reorderItems(sourceId, node.dataset.id);
          state.dragId = null;
          state.dragOverId = null;
          state.suppressClick = false;
        });
      }

      const activeCard = grid.querySelector('.card.active');
      if (activeCard) {
        activeCard.scrollIntoView({ block: 'nearest', inline: 'nearest' });
      }
    }

    function filterItems() {
      const query = search.value.trim().toLowerCase();

      if (state.editing || !query) {
        state.items = [...state.allItems];
      } else {
        state.items = state.allItems
          .map(item => ({ item, score: score(item, query) }))
          .filter(entry => entry.score >= 0)
          .sort((a, b) => b.score - a.score)
          .map(entry => entry.item);
      }

      if (state.activeIndex >= state.items.length) state.activeIndex = 0;
      render();
    }

    function runItem(id) {
      if (!id || state.editing) return;
      postMessage({ type: 'run', id });
    }

    function closeLauncher() {
      if (state.editing) {
        setEditing(false);
        return;
      }
      postMessage({ type: 'close' });
    }

    function moveSelection(delta) {
      if (state.items.length === 0 || state.editing) return;
      const next = state.activeIndex + delta;
      if (next < 0) {
        state.activeIndex = state.items.length - 1;
      } else if (next >= state.items.length) {
        state.activeIndex = 0;
      } else {
        state.activeIndex = next;
      }
      render();
    }

    function moveGrid(delta) {
      if (window.innerWidth <= 720) {
        moveSelection(delta);
        return;
      }
      moveSelection(delta * 2);
    }

    editBtn.addEventListener('click', () => {
      setEditing(!state.editing);
      if (!state.editing) {
        search.focus();
      }
    });

    search.addEventListener('input', filterItems);
    search.addEventListener('keydown', event => {
      if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
        event.preventDefault();
        moveSelection(1);
      } else if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
        event.preventDefault();
        moveSelection(-1);
      } else if (event.key === 'PageDown') {
        event.preventDefault();
        moveGrid(1);
      } else if (event.key === 'PageUp') {
        event.preventDefault();
        moveGrid(-1);
      } else if (event.key === 'Enter') {
        event.preventDefault();
        const item = state.items[state.activeIndex];
        if (item) runItem(item.id);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        closeLauncher();
      }
    });

    window.setLauncherState = function(payload) {
      const items = (payload && payload.items) || [];
      state.allItems = items.map((item, index) => ({ ...item, rank: index }));
      state.activeIndex = 0;
      state.editing = false;
      shell.classList.remove('editing');
      editBtn.textContent = '编辑';
      search.value = '';
      search.disabled = false;
      filterItems();
    };

    window.setLauncherItems = function(items) {
      window.setLauncherState({ items });
    };

    window.focusLauncher = function() {
      if (!state.editing) {
        search.focus();
        search.select();
      }
    };
  </script>
</body>
</html>
