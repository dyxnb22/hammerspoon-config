<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --shell-bg: rgba(246, 247, 251, 0.94);
      --card-bg: rgba(255, 255, 255, 0.88);
      --card-hover: rgba(255, 255, 255, 0.98);
      --text: #101828;
      --muted: #667085;
      --hairline: rgba(15, 23, 42, 0.08);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --blue: linear-gradient(145deg, #7cc0ff 0%, #2b6ef2 100%);
      --indigo: linear-gradient(145deg, #b1acff 0%, #6471ff 100%);
      --teal: linear-gradient(145deg, #64ead6 0%, #0f9d8f 100%);
      --green: linear-gradient(145deg, #9ceb96 0%, #299657 100%);
      --orange: linear-gradient(145deg, #ffd890 0%, #ef8a24 100%);
      --pink: linear-gradient(145deg, #ffb4d0 0%, #ec5b8f 100%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: rgba(16, 19, 28, 0.94);
        --card-bg: rgba(28, 34, 47, 0.92);
        --card-hover: rgba(38, 46, 64, 0.98);
        --text: #f5f7fb;
        --muted: #95a0b7;
        --hairline: rgba(255, 255, 255, 0.08);
        --accent-soft: rgba(94, 168, 255, 0.18);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    }

    .shell {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: var(--shell-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 24px 80px rgba(15,23,42,0.22);
    }

    .topbar {
      padding: 18px 18px 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .editBtn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .toolbar {
      padding: 0 18px 12px;
      display: grid;
      gap: 10px;
    }

    .search {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      background: rgba(255,255,255,0.55);
      color: var(--text);
      padding: 0 14px;
      font-size: 17px;
      outline: none;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--hairline);
      background: rgba(255,255,255,0.18);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active,
    .chip:focus-visible {
      outline: none;
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(37,99,235,0.2);
    }

    .list {
      min-height: 0;
      overflow: auto;
      background: var(--hairline);
    }

    .row {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 72px;
      padding: 12px 16px;
      border: 0;
      border-bottom: 1px solid var(--hairline);
      background: var(--card-bg);
      color: inherit;
      text-align: left;
      cursor: pointer;
      user-select: none;
    }

    .row:last-child { border-bottom: 0; }

    .row:hover,
    .row.active {
      background: var(--card-hover);
    }

    .row.running { transform: scale(0.995); }
    .row.dragging { opacity: 0.35; }
    .row.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }

    .shell.editing .row {
      cursor: grab;
      animation: wiggle 0.28s ease-in-out infinite alternate;
    }

  .shell.editing .row:nth-child(2n) { animation-delay: 0.08s; }

    @keyframes wiggle {
      from { transform: rotate(-0.5deg); }
      to { transform: rotate(0.5deg); }
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(15,23,42,0.14);
    }

    .icon.blue { background: var(--blue); }
    .icon.indigo { background: var(--indigo); }
    .icon.teal { background: var(--teal); }
    .icon.green { background: var(--green); }
    .icon.orange { background: var(--orange); }
    .icon.pink { background: var(--pink); }

    .meta { min-width: 0; }

    .badge {
      display: inline-block;
      margin-bottom: 4px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rowTitle {
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.03em;
      line-height: 1.2;
      word-break: break-word;
    }

    .rowSubtitle {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .usage {
      font-size: 11px;
      color: var(--muted);
      padding-left: 8px;
      white-space: nowrap;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--card-bg);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px 13px;
      border-top: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 11px;
      background: rgba(255,255,255,0.12);
    }

    .keys { display: flex; gap: 6px; flex-wrap: wrap; }

    .key {
      min-width: 28px;
      border-radius: 8px;
      border: 1px solid var(--hairline);
      padding: 5px 7px;
      text-align: center;
      color: var(--text);
      background: rgba(255,255,255,0.16);
    }
  </style>
</head>
<body>
  <div id="shell" class="shell">
    <div class="topbar">
      <div>
        <div id="eyebrow" class="eyebrow">Launcher</div>
        <h1 id="title" class="title">Launcher</h1>
        <div id="subtitle" class="subtitle"></div>
      </div>
      <button id="editBtn" class="editBtn" type="button">Edit</button>
    </div>

    <div class="toolbar">
      <input id="search" class="search" type="search" autocomplete="off" />
      <div id="chips" class="chips"></div>
    </div>

    <div id="list" class="list"></div>

    <div class="footer">
      <div class="keys">
        <div class="key">↑</div>
        <div class="key">↓</div>
        <div class="key">Enter</div>
        <div class="key">Esc</div>
        <div class="key">E</div>
      </div>
      <div id="hint"></div>
    </div>
  </div>

  <script>
    const state = {
      allItems: [],
      items: [],
      activeIndex: 0,
      editing: false,
      kindFilter: '',
      chipIndex: 0,
      dragId: null,
      dragOverId: null,
      suppressClick: false,
      strings: {},
    };

    const icons = { window: '◫', app: '◎', command: '⌘' };
    const shell = document.getElementById('shell');
    const search = document.getElementById('search');
    const list = document.getElementById('list');
    const chips = document.getElementById('chips');
    const editBtn = document.getElementById('editBtn');
    const hint = document.getElementById('hint');

    function t(key, fallback) {
      return state.strings[key] || fallback;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function postMessage(payload) {
      try { webkit.messageHandlers.launcher.postMessage(payload); }
      catch (error) { console.log(error); }
    }

    function normalizeSearchText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[._/-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function score(item, query) {
      if (!query) return 1000 - item.rank;
      const q = normalizeSearchText(query);
      const title = normalizeSearchText(item.title);
      const subtitle = normalizeSearchText(item.subtitle || '');
      const badge = normalizeSearchText(item.badge || '');
      const extra = normalizeSearchText(item.searchText || '');
      const haystacks = [title, subtitle, badge, extra];

      if (title.startsWith(q)) return 3000 - item.rank;
      if (title.includes(q)) return 2000 - item.rank;
      if (haystacks.some(text => text.includes(q))) return 1400 - item.rank;

      const terms = q.split(' ').filter(Boolean);
      if (terms.length > 1 && terms.every(term => haystacks.some(text => text.includes(term)))) {
        return 1200 - item.rank;
      }

      return -1;
    }

    function applyStrings(strings) {
      state.strings = strings || {};
      document.getElementById('eyebrow').textContent = t('title', 'Launcher');
      document.getElementById('title').textContent = t('title', 'Launcher');
      document.getElementById('subtitle').textContent = t('subtitle', '');
      search.placeholder = t('searchPlaceholder', 'Search...');
      editBtn.textContent = state.editing ? t('done', 'Done') : t('edit', 'Edit');
      hint.textContent = t('hint', '');
    }

    function chipDefs() {
      const counts = { window: 0, app: 0, command: 0 };
      for (const item of state.allItems) counts[item.kind] = (counts[item.kind] || 0) + 1;
      return [
        { id: '', label: t('all', 'All'), count: state.allItems.length },
        { id: 'command', label: t('command', 'Commands'), count: counts.command || 0 },
        { id: 'window', label: t('window', 'Windows'), count: counts.window || 0 },
        { id: 'app', label: t('app', 'Apps'), count: counts.app || 0 },
      ];
    }

    function renderChips() {
      const defs = chipDefs();
      if (state.chipIndex >= defs.length) state.chipIndex = 0;
      chips.innerHTML = defs.map((chip, index) => `
        <button type="button" class="chip${state.kindFilter === chip.id ? ' active' : ''}"
          data-kind="${escapeHtml(chip.id)}" data-index="${index}">
          ${escapeHtml(chip.label)} · ${chip.count}
        </button>
      `).join('');

      for (const chip of chips.querySelectorAll('.chip')) {
        chip.addEventListener('click', () => {
          state.kindFilter = chip.dataset.kind || '';
          state.chipIndex = Number(chip.dataset.index || 0);
          state.activeIndex = 0;
          filterItems();
        });
      }
    }

    function setEditing(enabled) {
      state.editing = enabled;
      shell.classList.toggle('editing', enabled);
      editBtn.textContent = enabled ? t('done', 'Done') : t('edit', 'Edit');
      search.disabled = enabled;
      render();
    }

    function persistLayout() {
      postMessage({ type: 'saveLayout', order: state.allItems.map(item => item.id) });
    }

    function reorderItems(sourceId, targetId) {
      if (!sourceId || !targetId || sourceId === targetId) return;
      const fromIndex = state.allItems.findIndex(item => item.id === sourceId);
      const toIndex = state.allItems.findIndex(item => item.id === targetId);
      if (fromIndex < 0 || toIndex < 0) return;
      const [moved] = state.allItems.splice(fromIndex, 1);
      state.allItems.splice(toIndex, 0, moved);
      state.allItems.forEach((item, index) => { item.rank = index; });
      persistLayout();
      filterItems();
    }

    function render() {
      renderChips();
      if (state.items.length === 0) {
        list.innerHTML = `<div class="empty">${escapeHtml(t('empty', 'No matches yet.'))}</div>`;
        return;
      }

      list.innerHTML = state.items.map((item, index) => {
        const classes = ['row'];
        if (index === state.activeIndex && !state.editing) classes.push('active');
        if (state.dragId === item.id) classes.push('dragging');
        if (state.dragOverId === item.id) classes.push('drag-over');
        return `
          <button type="button" class="${classes.join(' ')}" data-id="${escapeHtml(item.id)}" draggable="${state.editing}">
            <div class="icon ${escapeHtml(item.accent)}">${icons[item.kind] || '•'}</div>
            <div class="meta">
              <div class="badge">${escapeHtml(item.badge)}</div>
              <div class="rowTitle">${escapeHtml(item.title)}</div>
              <div class="rowSubtitle">${escapeHtml(item.subtitle || '')}</div>
            </div>
            <div class="usage">${item.usageCount ? item.usageCount + 'x' : ''}</div>
          </button>
        `;
      }).join('');

      for (const row of list.querySelectorAll('.row')) {
        row.addEventListener('click', event => {
          if (state.suppressClick || state.editing) {
            event.preventDefault();
            return;
          }
          const index = state.items.findIndex(item => item.id === row.dataset.id);
          if (index >= 0) state.activeIndex = index;
          runItem(row.dataset.id);
        });

        row.addEventListener('dragstart', event => {
          if (!state.editing) { event.preventDefault(); return; }
          state.dragId = row.dataset.id;
          state.suppressClick = true;
          event.dataTransfer.setData('text/plain', row.dataset.id);
          row.classList.add('dragging');
        });

        row.addEventListener('dragend', () => {
          state.dragId = null;
          state.dragOverId = null;
          state.suppressClick = false;
          render();
        });

        row.addEventListener('dragover', event => {
          if (!state.editing) return;
          event.preventDefault();
          state.dragOverId = row.dataset.id;
          row.classList.add('drag-over');
        });

        row.addEventListener('drop', event => {
          if (!state.editing) return;
          event.preventDefault();
          reorderItems(event.dataTransfer.getData('text/plain'), row.dataset.id);
        });
      }

      const activeRow = list.querySelector('.row.active');
      if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
    }

    function filterItems() {
      const query = search.value.trim().toLowerCase();
      state.items = state.allItems
        .filter(item => !state.kindFilter || item.kind === state.kindFilter)
        .map(item => ({ item, score: score(item, query) }))
        .filter(entry => entry.score >= 0)
        .sort((a, b) => b.score - a.score)
        .map(entry => entry.item);
      if (state.activeIndex >= state.items.length) state.activeIndex = 0;
      render();
    }

    function runItem(id) {
      if (!id || state.editing) return;
      postMessage({ type: 'run', id });
    }

    function closeLauncher() {
      if (state.editing) { setEditing(false); return; }
      postMessage({ type: 'close' });
    }

    function moveSelection(delta) {
      if (!state.items.length || state.editing) return;
      const next = state.activeIndex + delta;
      if (next < 0) state.activeIndex = state.items.length - 1;
      else if (next >= state.items.length) state.activeIndex = 0;
      else state.activeIndex = next;
      render();
    }

    function moveChip(delta) {
      const defs = chipDefs();
      state.chipIndex = (state.chipIndex + delta + defs.length) % defs.length;
      state.kindFilter = defs[state.chipIndex].id;
      state.activeIndex = 0;
      filterItems();
      const chip = chips.querySelector(`[data-index="${state.chipIndex}"]`);
      if (chip) chip.focus();
    }

    editBtn.addEventListener('click', () => {
      setEditing(!state.editing);
      if (!state.editing) search.focus();
    });

    search.addEventListener('input', () => { state.activeIndex = 0; filterItems(); });

    document.addEventListener('keydown', event => {
      if (event.target === search && ['ArrowDown', 'ArrowUp', 'Enter'].includes(event.key)) return;

      if (event.key === 'Escape') {
        event.preventDefault();
        closeLauncher();
      } else if (event.key === 'e' && !state.editing && document.activeElement !== search) {
        event.preventDefault();
        setEditing(true);
      } else if (event.key === 'Enter' && !state.editing) {
        const item = state.items[state.activeIndex];
        if (item) { event.preventDefault(); runItem(item.id); }
      } else if (event.key === 'ArrowDown' && !state.editing) {
        event.preventDefault();
        moveSelection(1);
      } else if (event.key === 'ArrowUp' && !state.editing) {
        event.preventDefault();
        moveSelection(-1);
      } else if (event.key === 'Tab' && event.shiftKey) {
        event.preventDefault();
        moveChip(-1);
      } else if (event.key === 'Tab') {
        event.preventDefault();
        moveChip(1);
      }
    });

    search.addEventListener('keydown', event => {
      if (event.key === 'ArrowDown') { event.preventDefault(); moveSelection(1); }
      else if (event.key === 'ArrowUp') { event.preventDefault(); moveSelection(-1); }
      else if (event.key === 'Enter') {
        event.preventDefault();
        const item = state.items[state.activeIndex];
        if (item) runItem(item.id);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        event.stopPropagation();
        closeLauncher();
      }
    });

    window.setLauncherState = function(payload) {
      payload = payload || {};
      state.allItems = (payload.items || []).map((item, index) => ({ ...item, rank: index }));
      state.activeIndex = 0;
      state.editing = false;
      state.kindFilter = '';
      state.chipIndex = 0;
      shell.classList.remove('editing');
      search.value = '';
      search.disabled = false;
      applyStrings(payload.strings || {});
      filterItems();
    };

    window.setLauncherItems = function(items) {
      window.setLauncherState({ items });
    };

    window.focusLauncher = function() {
      if (!state.editing) { search.focus(); search.select(); }
    };
  </script>
</body>
</html>
