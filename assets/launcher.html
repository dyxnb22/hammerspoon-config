<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --shell-bg: rgba(248, 249, 252, 0.92);
      --panel-bg: rgba(255, 255, 255, 0.72);
      --text: #111827;
      --muted: #6b7280;
      --hairline: rgba(15, 23, 42, 0.08);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --blue: linear-gradient(145deg, #7cc0ff 0%, #2b6ef2 100%);
      --indigo: linear-gradient(145deg, #b1acff 0%, #6471ff 100%);
      --teal: linear-gradient(145deg, #64ead6 0%, #0f9d8f 100%);
      --green: linear-gradient(145deg, #9ceb96 0%, #299657 100%);
      --orange: linear-gradient(145deg, #ffd890 0%, #ef8a24 100%);
      --pink: linear-gradient(145deg, #ffb4d0 0%, #ec5b8f 100%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: rgba(17, 20, 28, 0.92);
        --panel-bg: rgba(30, 36, 48, 0.82);
        --text: #f3f4f6;
        --muted: #9ca3af;
        --hairline: rgba(255, 255, 255, 0.08);
        --accent-soft: rgba(94, 168, 255, 0.16);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
    }

    .shell {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--shell-bg);
      backdrop-filter: blur(42px) saturate(180%);
      -webkit-backdrop-filter: blur(42px) saturate(180%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset, 0 20px 60px rgba(15,23,42,0.2);
    }

    .searchbar {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--hairline);
    }

    .search {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      background: var(--panel-bg);
      color: var(--text);
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }

    .search:focus {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .metaRow {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--hairline);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
    }

    .chip.active {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(37,99,235,0.2);
    }

    .body {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 220px;
    }

    .list {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--hairline);
    }

    .actionsPane {
      min-height: 0;
      overflow: auto;
      background: rgba(255,255,255,0.04);
      padding: 12px;
    }

    .actionsTitle {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .actionBtn {
      width: 100%;
      border: 1px solid var(--hairline);
      background: var(--panel-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .actionBtn.primary,
    .actionBtn.active {
      border-color: rgba(37,99,235,0.25);
      background: var(--accent-soft);
    }

    .row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 64px;
      padding: 10px 14px;
      border: 0;
      border-bottom: 1px solid var(--hairline);
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .row:hover,
    .row.active {
      background: rgba(255,255,255,0.12);
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 700;
    }

    .icon.blue { background: var(--blue); }
    .icon.indigo { background: var(--indigo); }
    .icon.teal { background: var(--teal); }
    .icon.green { background: var(--green); }
    .icon.orange { background: var(--orange); }
    .icon.pink { background: var(--pink); }

    .rowTitle {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.25;
      word-break: break-word;
    }

    .rowSubtitle {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      word-break: break-word;
    }

    .badge {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .groupHeader {
      padding: 6px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--shell-bg);
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 1px solid var(--hairline);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .empty, .loading {
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 11px;
    }

    .keys { display: flex; gap: 6px; flex-wrap: wrap; }

    .key {
      border-radius: 7px;
      border: 1px solid var(--hairline);
      padding: 4px 7px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="searchbar">
      <input id="search" class="search" type="search" autocomplete="off" spellcheck="false" />
      <div class="metaRow">
        <div id="chips" class="chips"></div>
        <div id="status"></div>
      </div>
    </div>

    <div class="body">
      <div id="list" class="list"></div>
      <div class="actionsPane">
        <div id="actionsTitle" class="actionsTitle">Actions</div>
        <div id="actions"></div>
      </div>
    </div>

    <div class="footer">
      <div class="keys">
        <span class="key">↑↓</span>
        <span class="key">Enter</span>
        <span class="key">⌘K</span>
        <span class="key">Tab</span>
        <span class="key">Esc</span>
      </div>
      <div id="hint"></div>
    </div>
  </div>

  <script>
    const state = {
      allItems: [],
      items: [],
      activeIndex: 0,
      actionIndex: 0,
      focusPane: 'list',
      kindFilter: '',
      chipIndex: 0,
      strings: {},
      loading: false,
      searchTimer: null,
      selectedId: null,
      lastQuery: '',
    };

    const icons = {
      window: '◫', app: '◎', command: '⌘', clipboard: '⎘', todo: '☑',
      ai: '✦', file: '⌁', note: '✎', system: '⚙', shell: '$_',
      calculator: '=', link: '↗', snippet: '❖',
    };

    const GROUP_ORDER = ['_top', 'app', 'window', 'file', 'note', 'todo', 'clipboard', 'snippet', 'command', 'system', 'shell', 'ai', 'link', 'calculator'];
    const GROUP_LABELS = {
      '_top': 'Top Hits',
      'app': 'Apps', 'window': 'Windows', 'file': 'Files', 'note': 'Notes',
      'todo': 'Tasks', 'clipboard': 'Clipboard', 'snippet': 'Snippets',
      'command': 'Commands', 'system': 'System', 'shell': 'Shell',
      'ai': 'AI', 'link': 'Links', 'calculator': 'Calculator',
    };

    const search = document.getElementById('search');
    const list = document.getElementById('list');
    const chips = document.getElementById('chips');
    const actions = document.getElementById('actions');
    const status = document.getElementById('status');
    const hint = document.getElementById('hint');

    function t(key, fallback) {
      return state.strings[key] || fallback;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function postMessage(payload) {
      try { webkit.messageHandlers.launcher.postMessage(payload); }
      catch (error) { console.log(error); }
    }

    function chipDefs() {
      const counts = {};
      for (const item of state.allItems) counts[item.kind] = (counts[item.kind] || 0) + 1;
      return [
        { id: '', label: t('all', 'All'), count: state.allItems.length },
        { id: 'app', label: t('app', 'Apps'), count: counts.app || 0 },
        { id: 'window', label: t('window', 'Windows'), count: counts.window || 0 },
        { id: 'file', label: t('file', 'Files'), count: counts.file || 0 },
        { id: 'clipboard', label: t('clipboard', 'Clipboard'), count: (counts.clipboard || 0) + (counts.snippet || 0) },
        { id: 'todo', label: t('todo', 'Tasks'), count: counts.todo || 0 },
        { id: 'ai', label: t('ai', 'AI'), count: counts.ai || 0 },
        { id: 'command', label: t('command', 'Commands'), count: counts.command || 0 },
      ].filter(chip => chip.id === '' || chip.count > 0);
    }

    function activeItem() {
      return state.items[state.activeIndex] || null;
    }

    function syncActiveItem() {
      const item = activeItem();
      state.selectedId = item ? item.id : null;
    }

    function primaryAction(item) {
      const actions = item?.actions || [];
      return actions.find(action => action.primary) || actions[0] || { id: 'open', label: 'Open' };
    }

    function keepOpenFor(actionId, item) {
      if (!item) return false;
      if (['toggle', 'delete', 'copy'].includes(actionId)) return true;
      if (item.kind === 'todo' || item.kind === 'clipboard') return actionId !== 'paste' && actionId !== 'open';
      return false;
    }

    function renderChips() {
      const defs = chipDefs();
      if (state.chipIndex >= defs.length) state.chipIndex = 0;
      chips.innerHTML = defs.map((chip, index) => `
        <button type="button" class="chip${state.kindFilter === chip.id ? ' active' : ''}"
          data-kind="${escapeHtml(chip.id)}" data-index="${index}">
          ${escapeHtml(chip.label)}${chip.id ? ' · ' + chip.count : ''}
        </button>
      `).join('');

      for (const chip of chips.querySelectorAll('.chip')) {
        chip.addEventListener('click', () => {
          state.kindFilter = chip.dataset.kind || '';
          state.chipIndex = Number(chip.dataset.index || 0);
          state.activeIndex = 0;
          filterItems();
        });
      }
    }

    function renderActions() {
      const item = activeItem();
      document.getElementById('actionsTitle').textContent = item ? t('actions', 'Actions') : t('actionHint', 'Actions');
      if (!item || !item.actions || !item.actions.length) {
        actions.innerHTML = `<div class="empty">${escapeHtml(t('actionHint', 'Select a result'))}</div>`;
        return;
      }

      actions.innerHTML = item.actions.map((action, index) => `
        <button type="button" class="actionBtn${action.primary ? ' primary' : ''}${index === state.actionIndex && state.focusPane === 'actions' ? ' active' : ''}"
          data-action="${escapeHtml(action.id)}">
          ${escapeHtml(action.label)}
        </button>
      `).join('');

      for (const button of actions.querySelectorAll('.actionBtn')) {
        button.addEventListener('click', () => runItem(item.id, button.dataset.action));
      }
    }

    function renderList() {
      if (state.loading && state.items.length === 0) {
        list.innerHTML = `<div class="loading">${escapeHtml(t('loading', 'Searching…'))}</div>`;
        renderActions();
        return;
      }

      if (state.items.length === 0) {
        list.innerHTML = `<div class="empty">${escapeHtml(t('empty', 'No matches yet.'))}</div>`;
        renderActions();
        return;
      }

      const parts = [];
      let lastGroup = null;
      for (let index = 0; index < state.items.length; index++) {
        const item = state.items[index];
        const group = item._group;
        if (!state.kindFilter && group && group !== lastGroup) {
          const label = GROUP_LABELS[group] || group;
          parts.push(`<div class="groupHeader" aria-hidden="true">${escapeHtml(label)}</div>`);
          lastGroup = group;
        }
        const isActive = index === state.activeIndex && state.focusPane === 'list';
        parts.push(`<button type="button" class="row${isActive ? ' active' : ''}" data-id="${escapeHtml(item.id)}" data-index="${index}">
          <div class="icon ${escapeHtml(item.accent)}">${icons[item.kind] || '•'}</div>
          <div>
            <div class="rowTitle">${escapeHtml(item.title)}</div>
            <div class="rowSubtitle">${escapeHtml(item.subtitle || '')}</div>
          </div>
          <div class="badge">${escapeHtml(item.badge || '')}</div>
        </button>`);
      }
      list.innerHTML = parts.join('');

      for (const row of list.querySelectorAll('.row')) {
        row.addEventListener('click', () => {
          const rowIndex = Number(row.dataset.index);
          state.activeIndex = rowIndex;
          state.selectedId = row.dataset.id;
          state.focusPane = 'list';
          render();
        });

        row.addEventListener('dblclick', () => {
          runItem(row.dataset.id);
        });
      }

      const activeRow = list.querySelector('.row.active');
      if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
      renderActions();
    }

    function render() {
      renderChips();
      renderList();
      status.textContent = state.loading
        ? t('loading', 'Searching…')
        : `${state.items.length} ${t('results', 'results')}`;
      hint.textContent = t('hint', '');
    }

    function buildGroupedItems(filtered) {
      // "Top Hits": items with usageCount > 0, only when searching, max 3
      const topHitIds = new Set();
      if (state.lastQuery) {
        let topCount = 0;
        for (const item of filtered) {
          if ((item.usageCount || 0) > 0 && topCount < 3) {
            topHitIds.add(item.id);
            topCount++;
          }
        }
      }

      const groupMap = new Map();
      for (const item of filtered) {
        const g = topHitIds.has(item.id) ? '_top' : (item.kind || 'command');
        if (!groupMap.has(g)) groupMap.set(g, []);
        groupMap.get(g).push(Object.assign({}, item, { _group: g }));
      }

      const result = [];
      for (const g of GROUP_ORDER) {
        const groupItems = groupMap.get(g);
        if (groupItems && groupItems.length > 0) {
          for (const item of groupItems) result.push(item);
          groupMap.delete(g);
        }
      }
      // Any kinds not in GROUP_ORDER appended at end
      for (const [, groupItems] of groupMap) {
        for (const item of groupItems) result.push(item);
      }
      return result;
    }

    function filterItems() {
      const filtered = state.allItems.filter(item => !state.kindFilter || item.kind === state.kindFilter);
      // Apply grouping when no kind filter active
      state.items = state.kindFilter ? filtered : buildGroupedItems(filtered);
      const preservedIndex = state.selectedId
        ? state.items.findIndex(item => item.id === state.selectedId)
        : -1;
      if (preservedIndex >= 0) {
        state.activeIndex = preservedIndex;
      } else if (state.activeIndex >= state.items.length) {
        state.activeIndex = 0;
      }
      if (state.actionIndex > 0) state.actionIndex = 0;
      syncActiveItem();
      render();
    }

    function scheduleSearch() {
      if (state.searchTimer) clearTimeout(state.searchTimer);
      state.searchTimer = setTimeout(() => {
        postMessage({ type: 'search', query: search.value.trim() });
      }, 120);
    }

    function runItem(id, actionId) {
      const item = state.items.find(entry => entry.id === id) || activeItem();
      if (!item) return;
      const action = actionId || primaryAction(item).id;
      postMessage({
        type: 'run',
        id: item.id,
        actionId: action,
        keepOpen: keepOpenFor(action, item),
      });
    }

    function closeLauncher() {
      postMessage({ type: 'close' });
    }

    function moveSelection(delta) {
      if (!state.items.length) return;
      const next = state.activeIndex + delta;
      if (next < 0) state.activeIndex = state.items.length - 1;
      else if (next >= state.items.length) state.activeIndex = 0;
      else state.activeIndex = next;
      state.actionIndex = 0;
      syncActiveItem();
      render();
    }

    function moveAction(delta) {
      const item = activeItem();
      if (!item || !item.actions || !item.actions.length) return;
      const next = state.actionIndex + delta;
      if (next < 0) state.actionIndex = item.actions.length - 1;
      else if (next >= item.actions.length) state.actionIndex = 0;
      else state.actionIndex = next;
      render();
    }

    function moveChip(delta) {
      const defs = chipDefs();
      state.chipIndex = (state.chipIndex + delta + defs.length) % defs.length;
      state.kindFilter = defs[state.chipIndex].id;
      state.activeIndex = 0;
      filterItems();
    }

    search.addEventListener('input', () => {
      state.activeIndex = 0;
      state.selectedId = null;
      scheduleSearch();
    });

    document.addEventListener('keydown', event => {
      const metaK = event.metaKey && event.key.toLowerCase() === 'k';
      if (metaK) {
        event.preventDefault();
        state.focusPane = state.focusPane === 'actions' ? 'list' : 'actions';
        render();
        return;
      }

      if (event.target === search && ['ArrowDown', 'ArrowUp', 'Enter'].includes(event.key) && state.focusPane === 'list') {
        return;
      }

      if (event.key === 'Escape') {
        event.preventDefault();
        closeLauncher();
      } else if (event.key === 'Tab' && event.shiftKey) {
        event.preventDefault();
        moveChip(-1);
      } else if (event.key === 'Tab') {
        event.preventDefault();
        moveChip(1);
      } else if (state.focusPane === 'actions') {
        if (event.key === 'ArrowDown') { event.preventDefault(); moveAction(1); }
        else if (event.key === 'ArrowUp') { event.preventDefault(); moveAction(-1); }
        else if (event.key === 'Enter') {
          const item = activeItem();
          const action = item?.actions?.[state.actionIndex];
          if (item && action) { event.preventDefault(); runItem(item.id, action.id); }
        } else if (event.key === 'ArrowLeft') {
          event.preventDefault();
          state.focusPane = 'list';
          render();
        }
      } else if (event.key === 'ArrowRight' && activeItem()?.actions?.length) {
        event.preventDefault();
        state.focusPane = 'actions';
        render();
      } else if (event.key === 'Enter') {
        const item = activeItem();
        if (item) { event.preventDefault(); runItem(item.id); }
      } else if (event.key === 'ArrowDown') {
        event.preventDefault();
        moveSelection(1);
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        moveSelection(-1);
      }
    });

    search.addEventListener('keydown', event => {
      if (event.key === 'ArrowDown') { event.preventDefault(); moveSelection(1); }
      else if (event.key === 'ArrowUp') { event.preventDefault(); moveSelection(-1); }
      else if (event.key === 'Enter') {
        event.preventDefault();
        const item = activeItem();
        if (item) runItem(item.id);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        event.stopPropagation();
        closeLauncher();
      }
    });

    window.setLauncherState = function(payload) {
      payload = payload || {};
      const incomingQuery = payload.query || '';
      const previousSelectedId = state.selectedId;
      const queryChanged = typeof payload.query === 'string' && incomingQuery !== state.lastQuery;

      if (typeof payload.query === 'string' && document.activeElement !== search) {
        search.value = incomingQuery;
      } else if (typeof payload.query === 'string' && search.value === '') {
        search.value = incomingQuery;
      }

      state.allItems = (payload.items || []).map((item, index) => ({ ...item, rank: index }));
      state.loading = !!payload.loading;
      state.strings = payload.strings || {};
      state.lastQuery = incomingQuery;
      state.selectedId = previousSelectedId;
      if (queryChanged) {
        state.activeIndex = 0;
        state.actionIndex = 0;
        state.focusPane = 'list';
      }
      search.placeholder = t('searchPlaceholder', 'Search...');
      filterItems();
    };

    window.focusLauncher = function() {
      search.focus();
      search.select();
    };

    window.overrideQuery = function(q) {
      search.value = q || '';
      state.lastQuery = q || '';
      state.activeIndex = 0;
      state.selectedId = null;
      if (state.searchTimer) clearTimeout(state.searchTimer);
      postMessage({ type: 'search', query: q || '' });
    };
  </script>
</body>
</html>
